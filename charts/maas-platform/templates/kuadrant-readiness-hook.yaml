apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuadrant-readiness-check
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuadrant-readiness-check
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: ["kuadrant.io"]
    resources: ["kuadrants"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuadrant-readiness-check
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
  - kind: ServiceAccount
    name: kuadrant-readiness-check
    namespace: kuadrant-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kuadrant-readiness-check
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kuadrant-readiness-check
  namespace: kuadrant-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    spec:
      serviceAccountName: kuadrant-readiness-check
      restartPolicy: Never
      containers:
        - name: check
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "Waiting for Kuadrant CR to exist..."
              for i in $(seq 1 30); do
                if oc get kuadrant kuadrant -n kuadrant-system &>/dev/null; then
                  break
                fi
                echo "  attempt $i/30 - Kuadrant CR not found yet"
                sleep 10
              done

              echo "Checking Kuadrant readiness..."
              for i in $(seq 1 30); do
                READY=$(oc get kuadrant kuadrant -n kuadrant-system \
                  -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Unknown")
                REASON=$(oc get kuadrant kuadrant -n kuadrant-system \
                  -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null || echo "Unknown")

                echo "  attempt $i/30 - Ready=$READY Reason=$REASON"

                if [ "$READY" = "True" ]; then
                  echo "Kuadrant is ready."
                  exit 0
                fi

                if [ "$REASON" = "MissingDependency" ]; then
                  echo "Kuadrant stuck in MissingDependency - restarting operator pod..."
                  oc delete pod -n kuadrant-system \
                    -l app.kubernetes.io/component=manager,app.kubernetes.io/name=kuadrant-operator \
                    --ignore-not-found=true 2>/dev/null || true
                  # Fallback: try by deployment name
                  oc delete pod -n kuadrant-system \
                    -l control-plane=controller-manager \
                    --ignore-not-found=true 2>/dev/null || true
                  echo "Operator pod restarted. Waiting for reconciliation..."
                  sleep 30
                  continue
                fi

                sleep 10
              done

              echo "ERROR: Kuadrant did not become ready within timeout"
              exit 1
