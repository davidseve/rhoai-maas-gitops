# Cluster domain (e.g. apps.ocp.sandbox808.opentlc.com)
# Required for Route host: maas.<clusterDomain>
clusterDomain: ""

datasciencecluster:
  name: default-dsc
  components:
    dashboard:
      managementState: Managed
    kserve:
      managementState: Managed
    llamastackoperator:
      managementState: Managed
    modelsAsService:
      managementState: Managed
    aipipelines:
      managementState: Removed
    feastoperator:
      managementState: Removed
    kueue:
      managementState: Removed
    mlflowoperator:
      managementState: Removed
    modelregistry:
      managementState: Removed
    ray:
      managementState: Removed
    trainer:
      managementState: Removed
    trainingoperator:
      managementState: Removed
    trustyai:
      managementState: Removed
    workbenches:
      managementState: Removed

dashboard:
  genAiStudio: true
  modelAsService: true

# Gateway is a PREREQUISITE for modelsAsService in the DSC.
# The maas-controller needs this Gateway to exist before it can reconcile.
# It does NOT create the Gateway itself -- we must provide it.
gateway:
  enabled: true
  name: maas-default-gateway
  namespace: openshift-ingress
  tlsSecretName: ingress-certs
  modelNamespaces:
    - maas-models

# Route exposes the maas-default-gateway externally.
# The Service target name depends on the GatewayClass -- verify after deploy.
route:
  enabled: true
  name: maas-default-gateway
  namespace: openshift-ingress
  # Service name created by Gateway API for the maas-default-gateway
  # This changes depending on GatewayClass name. Check with:
  #   oc get svc -n openshift-ingress | grep maas-default-gateway
  serviceName: maas-default-gateway-openshift-default
  tlsTermination: passthrough
