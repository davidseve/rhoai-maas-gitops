global:
  name: tinyllama-test
  namespace: maas-models

mode: llminferenceservice

namespace:
  create: true

model:
  storageUri: "oci://quay.io/rh-aiservices-bu/tinyllama:1.0"
  servedName: "tinyllama-test"
  maxModelLen: 2048

images:
  vllm:
    # CPU: quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9:0.3
    # GPU: quay.io/modh/vllm:rhoai-2.20-cuda (default llm-d image)
    repository: "quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9"
    tag: "0.3"

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "8"
    memory: "8Gi"

llminferenceservice:
  replicas: 1
  tiers:
    - free
    - premium
    - enterprise
  gateway:
    name: maas-default-gateway
    namespace: openshift-ingress

rbac:
  enabled: true
  tierGroups:
    - system:serviceaccounts:maas-default-gateway-tier-free
    - system:serviceaccounts:maas-default-gateway-tier-premium
    - system:serviceaccounts:maas-default-gateway-tier-enterprise

# Rate limiting configuration (per-tier, multi-window)
rateLimiting:
  requestRates:
    enabled: true
  tokenRates:
    enabled: true
  tiers:
    - name: free
      requestRates:
        - limit: 100
          window: 1m
        - limit: 5000
          window: 24h
      tokenRates:
        - limit: 10000
          window: 1m
        - limit: 500000
          window: 24h
    - name: premium
      requestRates:
        - limit: 500
          window: 1m
        - limit: 50000
          window: 24h
      tokenRates:
        - limit: 100000
          window: 1m
        - limit: 5000000
          window: 24h
    - name: enterprise
      requestRates:
        - limit: 2000
          window: 1m
        - limit: 200000
          window: 24h
      tokenRates:
        - limit: 500000
          window: 1m
        - limit: 25000000
          window: 24h

# TelemetryPolicy: enriches Limitador metrics with user/group/model labels
telemetry:
  enabled: true

# ServiceMonitor for Limitador metrics scraping
monitoring:
  enabled: true
  scrapeInterval: 30s

# PrometheusRule alerts for rate limit health
alerting:
  enabled: true
  rejectionRateThreshold: 0.3
