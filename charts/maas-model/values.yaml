global:
  name: tinyllama-test
  namespace: maas-models

mode: llminferenceservice

namespace:
  create: true

model:
  storageUri: "oci://quay.io/rh-aiservices-bu/tinyllama:1.0"
  servedName: "tinyllama-test"
  maxModelLen: 2048

images:
  vllm:
    repository: "quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9"
    tag: "0.3"

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "8"
    memory: "8Gi"

llminferenceservice:
  replicas: 1
  # Tiers that can access this model (empty list = all tiers)
  tiers:
    - free
    - premium
    - enterprise
  gateway:
    name: maas-default-gateway
    namespace: openshift-ingress

# ServiceMonitor for Limitador metrics scraping (optional custom monitoring)
monitoring:
  enabled: true
  scrapeInterval: 30s

# PrometheusRule alerts for rate limit health (optional custom alerting)
alerting:
  enabled: true
  rejectionRateThreshold: 0.3
