{{- if and .Values.rbac.enabled (eq .Values.mode "llminferenceservice") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.global.name }}-maas-access
  namespace: {{ .Values.global.namespace }}
rules:
- apiGroups:
  - serving.kserve.io
  resourceNames:
  - {{ .Values.global.name }}
  resources:
  - llminferenceservices
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.global.name }}-maas-access
  namespace: {{ .Values.global.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.global.name }}-maas-access
subjects:
{{- range .Values.rbac.tierGroups }}
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: {{ . }}
{{- end }}
{{- end }}
