{{- if .Values.telemetry.enabled }}
apiVersion: extensions.kuadrant.io/v1alpha1
kind: TelemetryPolicy
metadata:
  name: {{ .Values.global.name }}-telemetry
  namespace: {{ .Values.llminferenceservice.gateway.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.llminferenceservice.gateway.name }}
  metrics:
    default:
      labels:
        user: auth.identity.user.username
        group: auth.identity.user.groups
        model: request.path.split("/")[2]
{{- end }}
