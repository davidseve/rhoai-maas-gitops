apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: {{ .Values.global.name }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    alpha.maas.opendatahub.io/tiers: {{ .Values.llminferenceservice.tiers | toJson | quote }}
    security.opendatahub.io/enable-auth: "true"
spec:
  model:
    name: {{ .Values.model.servedName }}
    uri: {{ .Values.model.storageUri }}
  replicas: {{ .Values.llminferenceservice.replicas }}
  router:
    gateway:
      refs:
      - name: {{ .Values.llminferenceservice.gateway.name }}
        namespace: {{ .Values.llminferenceservice.gateway.namespace }}
    route: {}
  template:
    containers:
    - name: main
      image: {{ .Values.images.vllm.repository }}:{{ .Values.images.vllm.tag }}
      args:
      - --model
      - /mnt/models
      - --port
      - "8000"
      - --max-model-len
      - {{ .Values.model.maxModelLen | quote }}
      - --served-model-name
      - {{ .Values.model.servedName }}
      resources:
        limits:
          cpu: {{ .Values.resources.limits.cpu | quote }}
          memory: {{ .Values.resources.limits.memory | quote }}
        requests:
          cpu: {{ .Values.resources.requests.cpu | quote }}
          memory: {{ .Values.resources.requests.memory | quote }}
