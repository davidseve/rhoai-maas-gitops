{{- if .Values.rateLimiting.tokenRates.enabled }}
apiVersion: kuadrant.io/v1alpha1
kind: TokenRateLimitPolicy
metadata:
  name: {{ .Values.global.name }}-token-rate-limits
  namespace: {{ .Values.global.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: {{ .Values.global.name }}-kserve-route
  limits:
    {{- range .Values.rateLimiting.tiers }}
    {{ .name }}-user-tokens:
      rates:
        {{- toYaml .tokenRates | nindent 8 }}
      when:
        - predicate: |
            auth.identity.tier == "{{ .name }}"
      counters:
        - expression: auth.identity.userid
    {{- end }}
{{- end }}
