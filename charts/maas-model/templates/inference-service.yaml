{{- if eq .Values.mode "inferenceservice" }}
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: {{ .Values.global.name }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    openshift.io/display-name: {{ .Values.global.name }}
    serving.kserve.io/deploymentMode: RawDeployment
    security.opendatahub.io/enable-auth: "true"
  labels:
    opendatahub.io/dashboard: "true"
    networking.knative.dev/visibility: cluster-local
spec:
  predictor:
    maxReplicas: {{ .Values.inferenceservice.replicas }}
    minReplicas: {{ .Values.inferenceservice.replicas }}
    model:
      modelFormat:
        name: vLLM
      name: ""
      resources:
        limits:
          cpu: {{ .Values.resources.limits.cpu | quote }}
          memory: {{ .Values.resources.limits.memory | quote }}
        requests:
          cpu: {{ .Values.resources.requests.cpu | quote }}
          memory: {{ .Values.resources.requests.memory | quote }}
      runtime: vllm-cpu
      storageUri: {{ .Values.model.storageUri | quote }}
{{- if .Values.inferenceservice.route.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.global.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  to:
    kind: Service
    name: {{ .Values.global.name }}-predictor
  port:
    targetPort: 8443
  tls:
    termination: passthrough
  wildcardPolicy: None
{{- end }}
{{- end }}
