{{- if .Values.kuadrant.enabled }}
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: {{ .Values.kuadrant.package }}
  namespace: {{ .Values.kuadrant.namespace }}
spec:
  name: {{ .Values.kuadrant.package }}
  channel: {{ .Values.kuadrant.channel }}
  source: {{ .Values.kuadrant.source }}
  sourceNamespace: {{ .Values.kuadrant.sourceNamespace }}
{{- end }}
