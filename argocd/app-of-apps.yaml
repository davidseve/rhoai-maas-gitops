apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maas-gitops
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/davidseve/rhoai-maas-gitops.git
    targetRevision: feature/maas-governance-stack
    path: argocd/apps
    helm:
      parameters:
        - name: clusterDomain
          value: apps.ocp.sandbox3733.opentlc.com
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
