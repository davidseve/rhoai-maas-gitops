apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maas-gitops
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/davidseve/rhoai-maas-gitops.git
    targetRevision: main
    path: argocd
    directory:
      recurse: false
      include: '{operators.yaml,maas-platform.yaml,maas-model.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
